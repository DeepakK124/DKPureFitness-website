<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager - DK Pure Fitness</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* --- DK PURE FITNESS LIGHT THEME --- */
      
      /* Global Font */
      * {
        font-family: 'Inter', sans-serif !important;
      }

      /* Cards hover effect */
      a[class*="Card"]:hover {
        border-color: #F97316 !important;
      }
      
      /* Inputs focus effect */
      input:focus, textarea:focus, div[role="textbox"]:focus {
        border-color: #F97316 !important;
        outline: none !important;
        box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2) !important;
      }

      /* Active Sidebar Links & Headers */
      /* Use strict aria-current matching to avoid highlighting all links */
      a[aria-current="page"] {
        color: #F97316 !important;
        background-color: rgba(249, 115, 22, 0.05) !important;
        border-left: 4px solid #F97316 !important;
      }
      
      a[aria-current="page"] svg {
        color: #F97316 !important;
        fill: #F97316 !important;
      }

      /* Hover Sidebar Links */
      aside a:hover, div[class*="Sidebar"] a:hover {
        color: #F97316 !important;
        background-color: rgba(249, 115, 22, 0.05) !important;
      }
      
      aside a:hover svg, div[class*="Sidebar"] a:hover svg {
        color: #F97316 !important;
        fill: #F97316 !important;
      }

      /* Header Active elements */
      header a[aria-current="page"] {
        border-bottom-color: #F97316 !important;
      }

      /* Primary Buttons Style adjustments */
      button {
        border-radius: 2px !important;
      }

      /* Image Previews / Media Constraints */
      /* Prevent high-res images from blowing up the editor layout */
      img {
        max-width: 100% !important;
        max-height: 400px !important;
        object-fit: contain !important;
      }

      /* Inject Gym Logo into the top of the Sidebar */
      aside, div[class*="SidebarContainer"], div[class*="Sidebar"] {
        position: relative;
      }
      
      aside::before, div[class*="Sidebar"]::before {
        content: "";
        display: block;
        width: 95%;
        height: 180px;
        margin: 20px auto 10px auto;
        background-image: url('/logo.png');
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        /* Removed the invert filter so the logo displays its natural colors (orange/black) */
      }
      
      div[class*="SidebarHeading"]::before, ul::before, li::before {
        display: none !important;
      }

      /* Scrollbars */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #F1F5F9;
      }
      ::-webkit-scrollbar-thumb {
        background: #CBD5E1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #F97316;
      }
    </style>
  </head>
  <body>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // Register custom stylesheet for the right-hand preview pane iframe
      CMS.registerPreviewStyle("preview.css");
    </script>
  </body>
</html>
