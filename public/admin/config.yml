backend:
  name: github
  repo: sxm-0410/Gym-Website
  branch: trial-decap-cms
  base_url: ""
  auth_endpoint: "api/auth"

# local_backend: true

logo_url: "/logo.png"

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "landing_page_config"
    label: "Landing Page Texts"
    files:
      - name: "landing_page"
        label: "Edit Page Text"
        file: "src/content/page-content.json"
        description: "Manage all text and labels on the main landing page"
        fields:
          - name: "hero"
            label: "Hero Section"
            widget: "object"
            fields:
              - {label: "Background Image", name: "background_image", widget: "image"}
              - {label: "Watermark Part 1", name: "watermark1", widget: "string"}
              - {label: "Watermark Part 2", name: "watermark2", widget: "string"}
              - {label: "Small Label", name: "label", widget: "string"}
              - {label: "Title Part 1", name: "title_part1", widget: "string"}
              - {label: "Title Highlight (Orange)", name: "title_highlight", widget: "string"}
              - {label: "Title Part 2", name: "title_part2", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Primary Button Text", name: "cta1_text", widget: "string"}
              - {label: "Secondary Button Text", name: "cta2_text", widget: "string"}
              - name: "stats"
                label: "Stats Strip"
                widget: "list"
                fields:
                  - {label: "Value", name: "value", widget: "string"}
                  - {label: "Label", name: "label", widget: "string"}
                  
          - name: "about"
            label: "About Section"
            widget: "object"
            fields:
              - {label: "Section Label", name: "label", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "YouTube Callout Bold text", name: "youtube_callout_strong", widget: "string"}
              - {label: "YouTube Callout Normal text", name: "youtube_callout_text", widget: "string"}
              - {label: "YouTube Link Text", name: "youtube_link_text", widget: "string"}
              - {label: "YouTube URL", name: "youtube_link_url", widget: "string"}
              - name: "highlights"
                label: "Highlights (Weight Training, Zumba, etc)"
                widget: "list"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Description", name: "description", widget: "text"}

          - name: "equipment"
            label: "Equipment Section Headers"
            widget: "object"
            fields:
              - {label: "Section Label", name: "label", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}

          - name: "trainers"
            label: "Trainers Section Headers"
            widget: "object"
            fields:
              - {label: "Section Label", name: "label", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}

          - name: "transformations"
            label: "Transformations Section Headers"
            widget: "object"
            fields:
              - {label: "Section Label", name: "label", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}

          - name: "gallery"
            label: "Gallery Section Headers"
            widget: "object"
            fields:
              - {label: "Section Label", name: "label", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}

          - name: "reviews"
            label: "Reviews Section Headers"
            widget: "object"
            fields:
              - {label: "Section Label", name: "label", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}

          - name: "contact"
            label: "Contact Section Details"
            widget: "object"
            fields:
              - {label: "Section Label", name: "label", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Address Title", name: "address_title", widget: "string"}
              - {label: "Address Text", name: "address_text", widget: "text"}
              - {label: "Phone Title", name: "phone_title", widget: "string"}
              - {label: "Phone Text", name: "phone_text", widget: "string"}
              - {label: "Instagram Title", name: "instagram_title", widget: "string"}
              - {label: "Instagram Handle", name: "instagram_text", widget: "string"}
              - {label: "Working Hours Title", name: "working_hours_title", widget: "string"}
              - {label: "Working Hours Line 1", name: "working_hours_text_1", widget: "string"}
              - {label: "Working Hours Line 2", name: "working_hours_text_2", widget: "string"}

          - name: "footer"
            label: "Footer details"
            widget: "object"
            fields:
              - {label: "Description", name: "description", widget: "string"}
              - {label: "Contact Email", name: "contact_email", widget: "string"}
              - {label: "Copyright Text", name: "copyright", widget: "string"}
              
          - name: "ticker"
            label: "Scrolling Ticker Strip"
            widget: "list"
            fields:
              - {label: "Text", name: "text", widget: "string"}
              - {label: "Icon (Lucide name)", name: "icon", widget: "string", default: "Dumbbell"}

  - name: "equipment_config"
    label: "Equipment List"
    files:
      - name: "equipment"
        label: "Manage Equipment List"
        file: "src/content/equipment.json"
        description: "Manage the equipment list displayed on the website"
        fields:
          - name: "items"
            label: "Equipment Items"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Category", name: "category", widget: "select", options: ["Free Weights", "Strength", "Cable & Pulley", "Machines", "Cardio", "Combat", "Accessories", "Bodyweight", "Recovery"]}

  - name: "trainers_config"
    label: "Trainers List"
    files:
      - name: "trainers"
        label: "Manage Trainers"
        file: "src/content/trainers.json"
        description: "Manage the trainers displayed on the website"
        fields:
          - name: "items"
            label: "Trainer List"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Specialty", name: "specialty", widget: "string"}
              - {label: "Bio", name: "bio", widget: "text"}
              - {label: "Image", name: "image_url", widget: "image"}
              - {label: "Social URL", name: "social_url", widget: "string"}

  - name: "testimonials_config"
    label: "Transformations"
    files:
      - name: "testimonials"
        label: "Manage Transformations"
        file: "src/content/testimonials.json"
        description: "Manage transformation testimonials"
        fields:
          - name: "items"
            label: "Testimonials"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Member Name", name: "member_name", widget: "string"}
              - {label: "Transformation", name: "transformation", widget: "string"}
              - {label: "Quote", name: "quote", widget: "text"}
              - {label: "Rating", name: "rating", widget: "number", value_type: "int", min: 1, max: 5}

  - name: "reviews_config"
    label: "Google Reviews"
    files:
      - name: "reviews"
        label: "Manage Google Reviews"
        file: "src/content/reviews.json"
        description: "Manage Google reviews to display"
        fields:
          - name: "items"
            label: "Reviews"
            widget: "list"
            fields:
              - {label: "Reviewer Name", name: "name", widget: "string"}
              - {label: "Review Text", name: "review", widget: "text"}

  - name: "gallery_config"
    label: "Gallery Layout"
    files:
      - name: "gallery"
        label: "Manage Gallery Images"
        file: "src/content/gallery.json"
        description: "Manage gallery images and layout"
        fields:
          - name: "items"
            label: "Gallery Grid Items"
            widget: "list"
            fields:
              - label: "Type"
                name: "type"
                widget: "select"
                options: ["wide", "stacked"]
              - label: "Image (Wide only)"
                name: "src"
                widget: "image"
                required: false
              - label: "Alt Text (Wide only)"
                name: "alt"
                widget: "string"
                required: false
              - label: "Images (Stacked only)"
                name: "images"
                widget: "list"
                required: false
                fields:
                  - {label: "Image", name: "src", widget: "image"}
                  - {label: "Alt Text", name: "alt", widget: "string"}
              - label: "Mobile Width (px)"
                name: "mWidth"
                widget: "number"
                value_type: "int"
              - label: "Desktop Width (px)"
                name: "dWidth"
                widget: "number"
                value_type: "int"
              - label: "Width Tailwind Class"
                name: "width"
                widget: "string"
